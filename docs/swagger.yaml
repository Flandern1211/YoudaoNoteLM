                    properties:
                      data:
                        $ref: "#/components/schemas/SourceOriginalResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ==================== 导入 ====================
  /notebooks/{nbId}/import/file:
    post:
      tags: [Import]
      summary: 文件上传导入
      description: |
        上传文件并导入为资料来源。

        **支持的文件格式：** .txt, .md, .docx, .pdf, .pptx
        **文件大小限制：** ≤30MB

        **处理流程：**
        1. 存储原始文件到MinIO
        2. 调用MarkItDown转为Markdown
        3. 保存Source记录
        4. 触发向量化
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NotebookID"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: 上传的文件（≤30MB，支持 .txt/.md/.docx/.pdf/.pptx）
      responses:
        "200":
          description: 导入成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          source:
                            $ref: "#/components/schemas/Source"
        "400":
          description: 文件格式不支持或大小超限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                UnsupportedFormat:
                  summary: 不支持的文件格式
                  value:
                    code: 40001
                    message: "不支持的文件格式"
                    details: "仅支持 .txt, .md, .docx, .pdf, .pptx 格式"
                FileTooLarge:
                  summary: 文件大小超限
                  value:
                    code: 40002
                    message: "文件大小超限"
                    details: "文件大小不能超过30MB"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: 文件解析失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                ParseError:
                  summary: 文件解析失败
                  value:
                    code: 40003
                    message: "文件解析失败"
                    details: "MarkItDown服务返回错误"

  /notebooks/{nbId}/import/audio/preview:
    post:
      tags: [Import]
      summary: 音频上传转写预览
      description: |
        上传音频文件，调用Whisper转写为文本并返回预览。

        **支持的音频格式：** .mp3, .wav
        **文件大小限制：** ≤300MB
        **预览有效期：** 30分钟

        预览返回后，用户可以编辑内容，然后调用确认接口完成导入。
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NotebookID"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: 音频文件（≤300MB，支持 .mp3/.wav）
      responses:
        "200":
          description: 转写成功，返回预览
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AudioPreviewResponse"
        "400":
          description: 文件格式不支持或大小超限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: 音频转写失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                ASRError:
                  summary: ASR服务不可用
                  value:
                    code: 40005
                    message: "音频转写失败"
                    details: "ASR服务未配置或不可用"

  /import/audio/confirm:
    post:
      tags: [Import]
      summary: 确认音频导入
      description: |
        用户确认音频转写内容后，保存为资料来源。

        如果提供了编辑后的内容，则使用编辑后的内容；否则使用原始转写内容。
        确认后直接保存文本并触发向量化，无需再过MarkItDown。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AudioConfirmRequest"
      responses:
        "200":
          description: 确认成功，导入完成
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          source:
                            $ref: "#/components/schemas/Source"
        "400":
          description: 预览不存在或已过期
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                PreviewExpired:
                  summary: 预览已过期
                  value:
                    code: 40009
                    message: "预览已过期"
                    details: "请重新上传音频文件"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /import/tasks/{taskId}:
    get:
      tags: [Import]
      summary: 查询导入任务进度
      description: 查询批量导入任务的执行进度和结果（存储在Redis中，24小时过期）
      security:
