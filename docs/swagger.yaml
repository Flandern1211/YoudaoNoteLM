                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SourceContentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /notebooks/{nbId}/sources/{id}/original:
    get:
      tags: [Source]
      summary: 获取原格式内容
      description: |
        获取资料来源的原始格式内容。

        **原格式内容说明：**
        - `file` 类型：返回文件渲染内容（PDF/DOCX等）
        - `url` 类型：返回原始 URL 链接
        - `audio` 类型：不支持查看原格式
        - `note`/`youdao` 类型：返回原始 Markdown
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NotebookID"
        - $ref: "#/components/parameters/SourceID"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
