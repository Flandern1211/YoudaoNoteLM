        "500":
          $ref: "#/components/responses/InternalError"

  # ==================== 用户配置（统一） ====================
  /user/config/{type}:
    get:
      tags: [UserConfig]
      summary: 获取用户配置
      description: 获取当前用户指定类型的配置（搜索/ASR/Embedding，一人一条）
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: path
          required: true
          description: 配置类型
          schema:
            type: string
            enum: [search, asr, embedding]
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          config:
                            $ref: "#/components/schemas/UserConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /user/config:
    post:
      tags: [UserConfig]
      summary: 创建用户配置
      description: 为当前用户创建指定类型的配置（每种类型仅一条，已存在则返回错误）
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserConfigRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          config:
                            $ref: "#/components/schemas/UserConfig"
        "400":
          description: 参数错误或该类型配置已存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /user/config/{id}:
    put:
      tags: [UserConfig]
      summary: 更新用户配置
      description: 更新指定的用户配置
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 配置ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserConfigRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          config:
                            $ref: "#/components/schemas/UserConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [UserConfig]
      summary: 删除用户配置
      description: 删除指定的用户配置
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 配置ID
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            type: string
                            example: "删除成功"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
