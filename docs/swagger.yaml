          description: 任务ID (UUID)
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ImportTaskResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ==================== 搜索Agent ====================
  /notebooks/{nbId}/search:
    post:
      tags: [SearchAgent]
      summary: 搜索/URL导入
      description: |
        通过搜索Agent执行搜索或直接导入URL内容。

        **关键词搜索：** 理解搜索意图，调用搜索引擎返回结果列表
        **URL导入：** 直接抓取网页内容并保存为资料来源
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NotebookID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
            examples:
              keyword_search:
                summary: 关键词搜索
                value:
                  query: "机器学习入门"
                  type: "keyword"
              url_import:
                summary: URL导入
                value:
                  query: "https://example.com/article"
                  type: "url"
      responses:
        "200":
          description: |
            **关键词搜索：** 返回搜索结果列表
            **URL导入：** 直接返回导入后的Source对象
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        oneOf:
                          - $ref: "#/components/schemas/SearchResponse"
                          - type: object
                            properties:
                              source:
                                $ref: "#/components/schemas/Source"
        "400":
          description: 搜索API配额耗尽或URL抓取失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                QuotaExhausted:
                  summary: 搜索API配额耗尽
                  value:
                    code: 40006
                    message: "搜索API配额耗尽"
                    details: "请配置其他搜索服务或等待配额重置"
                FetchFailed:
                  summary: 网页抓取失败
                  value:
                    code: 40004
                    message: "网页抓取失败"
                    details: "无法访问该URL"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /notebooks/{nbId}/search/import:
    post:
      tags: [SearchAgent]
      summary: 批量导入搜索结果
      description: |
        批量导入多个URL的网页内容。返回导入任务，可通过任务ID查询进度。

        部分URL失败不影响其他URL的导入，任务状态会反映部分失败情况。
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NotebookID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchImportRequest"
      responses:
        "200":
          description: 任务创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ImportTaskResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

