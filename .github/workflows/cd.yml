# CD（持续部署）工作流配置
# 作用：构建 Docker 镜像 → 推送到 Docker Hub → 服务器拉取并部署
# 触发条件：CI 通过后合并到 develop 分支，或手动触发

name: CD

on:
  push:
    branches: [ develop ]

  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  # ========== 构建并推送 Docker 镜像 ==========
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/youdaonote:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/youdaonote:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push markitdown
        uses: docker/build-push-action@v6
        with:
          context: ./markitdown_service
          file: ./markitdown_service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/markitdown:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/markitdown:${{ github.sha }}
          cache-from: type=gha,scope=markitdown
          cache-to: type=gha,scope=markitdown,mode=max

  # ========== 部署到服务器 ==========
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push

    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            DEPLOY_DIR="/home/flandern/youdaonotelm"

            # 创建目录（如果不存在）
            mkdir -p "$DEPLOY_DIR/configs"

            # 更新 docker-compose.yml
            curl -fsSL "https://raw.githubusercontent.com/Flandern1211/YoudaoNoteLM/develop/docker-compose.yml" -o "$DEPLOY_DIR/docker-compose.yml"
            echo "✅ docker-compose.yml updated"

            cd "$DEPLOY_DIR"

            # Docker Hub 登录
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # 拉取最新镜像
            docker compose pull
            echo "✅ Images pulled"

            # 重启所有服务
            docker compose up -d
            echo "✅ Services restarted"

            # 等待启动
            sleep 15

            # 健康检查
            status=$(docker compose ps app | grep -c "Up")
            if [ "$status" -gt 0 ]; then
              echo "✅ App container is running"
            else
              echo "❌ App failed to start"
              docker compose logs --tail=50 app
              exit 1
            fi

      - name: Health check
        run: |
          sleep 10
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.STAGING_URL }}/health" || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed with status: $response"
            exit 1
          fi

  # ========== 生产环境部署（手动触发） ==========
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'

    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/youdaonote:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/youdaonote:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push markitdown
        uses: docker/build-push-action@v6
        with:
          context: ./markitdown_service
          file: ./markitdown_service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/markitdown:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/markitdown:${{ github.sha }}
          cache-from: type=gha,scope=markitdown
          cache-to: type=gha,scope=markitdown,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USERNAME }}
          key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            DEPLOY_DIR="/home/flandern/youdaonotelm"

            # 创建目录（如果不存在）
            mkdir -p "$DEPLOY_DIR/configs"

            # 更新 docker-compose.yml
            curl -fsSL "https://raw.githubusercontent.com/Flandern1211/YoudaoNoteLM/develop/docker-compose.yml" -o "$DEPLOY_DIR/docker-compose.yml"
            echo "✅ docker-compose.yml updated"

            cd "$DEPLOY_DIR"

            # Docker Hub 登录
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # 拉取最新镜像
            docker compose pull
            echo "✅ Images pulled"

            # 重启所有服务
            docker compose up -d
            echo "✅ Services restarted"

            # 等待启动
            sleep 15

            # 验证服务
            status=$(docker compose ps app | grep -c "Up")
            if [ "$status" -gt 0 ]; then
              echo "✅ Production service is running"
            else
              echo "❌ Production service failed to start"
              docker compose logs --tail=50 app
              exit 1
            fi

      - name: Production health check
        run: |
          sleep 10
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PRODUCTION_URL }}/health" || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ Production health check passed"
          else
            echo "❌ Production health check failed"
            exit 1
          fi
